<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">The two cases where RapidFuzzDotNet beat C++</title>
<desc id="desc">RapidFuzzDotNet beat the fastest C++ result in two stable comparable cases. Static Levenshtein on equal inputs was 3.157 times faster at length 1024 and 2.018 times faster at length 256. The complete result set contained 2 .NET wins, 534 C++ wins, and no ties.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.eyebrow { font-size: 14px; font-weight: 700; fill: #116329; }
.metric { font-size: 58px; font-weight: 800; fill: #116329; }
.label { font-size: 23px; font-weight: 700; }
.detail { font-size: 16px; fill: #57606a; }
.context-label { font-size: 15px; font-weight: 700; fill: #57606a; }
.context-value { font-size: 24px; font-weight: 800; }
.note { font-size: 15px; fill: #57606a; }
.win { fill: #116329; }
.loss { fill: #a40e26; }
.neutral { fill: #57606a; }
</style>
<rect width="1200" height="620" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="618" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="54" class="title">The two cases where .NET beat native C++</text>
<text x="60" y="84" class="subtitle">Exact case-level wins from 536 stable, semantically comparable measurements</text>
<rect x="60" y="125" width="520" height="280" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="92" y="163" class="eyebrow">LEVENSHTEIN WIN · LENGTH 1024</text>
<text x="92" y="245" class="metric">3.16x</text>
<text x="92" y="282" class="label">.NET faster than C++</text>
<text x="92" y="326" class="detail">Static scorer · equal input</text>
<text x="92" y="359" class="detail">case: core/levenshtein/static/1024/equal</text>
<rect x="620" y="125" width="520" height="280" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="652" y="163" class="eyebrow">LEVENSHTEIN WIN · LENGTH 256</text>
<text x="652" y="245" class="metric">2.02x</text>
<text x="652" y="282" class="label">.NET faster than C++</text>
<text x="652" y="326" class="detail">Static scorer · equal input</text>
<text x="652" y="359" class="detail">case: core/levenshtein/static/256/equal</text>
<rect x="60" y="445" width="1080" height="105" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="92" y="480" class="context-label">FULL RESULT SET</text>
<text x="92" y="523" class="context-value win">2 .NET wins</text>
<text x="365" y="523" class="context-value loss">534 C++ wins</text>
<text x="690" y="523" class="context-value neutral">0 ties</text>
<text x="60" y="590" class="note">The green cards show every .NET win from this run; the complete outcome count remains visible for context.</text>
</svg>
