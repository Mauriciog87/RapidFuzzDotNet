<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
<title id="title">Benchmark winners by category</title>
<desc id="desc">Each category names the faster implementation directly. C++ leads .NET by 3.4 times in batch, 16.6 times in core, and 22.5 times in fuzz. .NET leads Python by 12.7 times in batch, 12.4 times in core, and 1.8 times in fuzz.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.header { font-size: 17px; font-weight: 700; fill: #57606a; }
.row { font-size: 25px; font-weight: 700; }
.winner { font-size: 25px; font-weight: 800; }
.small { font-size: 15px; fill: #57606a; }
.note { font-size: 15px; fill: #57606a; }
.cpp { fill: #a40e26; }
.dotnet { fill: #116329; }
</style>
<rect width="1200" height="650" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="648" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="54" class="title">Category results, stated directly</text>
<text x="60" y="84" class="subtitle">The winner and multiplier are shown in each cell; bar length does not encode the result</text>
<text x="470" y="126" text-anchor="middle" class="header">AGAINST FASTEST C++</text>
<text x="925" y="126" text-anchor="middle" class="header">AGAINST RAPIDFUZZ PYTHON</text>
<text x="60" y="210" class="row">Batch</text>
<rect x="270" y="145" width="400" height="120" rx="8" fill="#fff1f0" stroke="#ff8182" stroke-width="2"/>
<text x="470" y="199" text-anchor="middle" class="winner cpp">C++ 3.4x faster</text>
<text x="470" y="231" text-anchor="middle" class="small">8 shared stable cases</text>
<rect x="710" y="145" width="430" height="120" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="925" y="199" text-anchor="middle" class="winner dotnet">.NET 12.7x faster</text>
<text x="925" y="231" text-anchor="middle" class="small">8 shared stable cases</text>
<text x="60" y="365" class="row">Core</text>
<rect x="270" y="300" width="400" height="120" rx="8" fill="#fff1f0" stroke="#ff8182" stroke-width="2"/>
<text x="470" y="354" text-anchor="middle" class="winner cpp">C++ 16.6x faster</text>
<text x="470" y="386" text-anchor="middle" class="small">260 shared stable cases</text>
<rect x="710" y="300" width="430" height="120" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="925" y="354" text-anchor="middle" class="winner dotnet">.NET 12.4x faster</text>
<text x="925" y="386" text-anchor="middle" class="small">215 shared stable cases</text>
<text x="60" y="520" class="row">Fuzz</text>
<rect x="270" y="455" width="400" height="120" rx="8" fill="#fff1f0" stroke="#ff8182" stroke-width="2"/>
<text x="470" y="509" text-anchor="middle" class="winner cpp">C++ 22.5x faster</text>
<text x="470" y="541" text-anchor="middle" class="small">268 shared stable cases</text>
<rect x="710" y="455" width="430" height="120" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="925" y="509" text-anchor="middle" class="winner dotnet">.NET 1.8x faster</text>
<text x="925" y="541" text-anchor="middle" class="small">266 shared stable cases</text>
<text x="60" y="618" class="note">Geometric mean within each category. The two opponent columns use their own applicable case sets and are not compared with each other.</text>
</svg>
