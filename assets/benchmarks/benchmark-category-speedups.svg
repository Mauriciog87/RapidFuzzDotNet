<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">Speedup by benchmark category</title>
<desc id="desc">Batch, core, and fuzz category geometric means compare .NET 10 with the fastest C++ result and RapidFuzz Python. .NET is slower than C++ in all categories and faster than Python in all categories.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.row { font-size: 22px; font-weight: 700; }
.small { font-size: 15px; fill: #57606a; }
.value { font-size: 17px; font-weight: 700; }
.tick { font-size: 14px; fill: #57606a; }
.legend { font-size: 16px; font-weight: 600; }
.note { font-size: 15px; fill: #57606a; }
</style>
<rect width="1200" height="620" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="618" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="56" class="title">Speedup by benchmark category</text>
<text x="60" y="87" class="subtitle">Values above 1x favor .NET; values below 1x favor the comparison runtime</text>
<rect x="747" y="70" width="14" height="14" fill="#cf222e" transform="rotate(45 754 77)"/>
<text x="772" y="83" class="legend">vs fastest C++</text>
<circle cx="960" cy="77" r="8" fill="#1a7f37"/>
<text x="978" y="83" class="legend">vs Python</text>
<line x1="315.0" y1="140" x2="315.0" y2="520" stroke="#d8dee4" stroke-width="1"/>
<text x="315.0" y="548" text-anchor="middle" class="tick">0.01x</text>
<line x1="516.3" y1="140" x2="516.3" y2="520" stroke="#d8dee4" stroke-width="1"/>
<text x="516.3" y="548" text-anchor="middle" class="tick">0.1x</text>
<line x1="717.5" y1="140" x2="717.5" y2="520" stroke="#24292f" stroke-width="2"/>
<text x="717.5" y="548" text-anchor="middle" class="tick">1x</text>
<line x1="918.8" y1="140" x2="918.8" y2="520" stroke="#d8dee4" stroke-width="1"/>
<text x="918.8" y="548" text-anchor="middle" class="tick">10x</text>
<line x1="1120.0" y1="140" x2="1120.0" y2="520" stroke="#d8dee4" stroke-width="1"/>
<text x="1120.0" y="548" text-anchor="middle" class="tick">100x</text>
<text x="65" y="206" class="row">Batch</text>
<text x="65" y="234" class="small">8 stable .NET cases</text>
<line x1="610.6" y1="215" x2="940.0" y2="215" stroke="#afb8c1" stroke-width="4" stroke-linecap="round"/>
<rect x="601.6" y="206" width="18" height="18" fill="#cf222e" stroke="#ffffff" stroke-width="2" transform="rotate(45 610.6 215)"/>
<text x="610.6" y="191" text-anchor="middle" class="value" fill="#a40e26">0.294x</text>
<circle cx="940.0" cy="215" r="12" fill="#1a7f37" stroke="#ffffff" stroke-width="3"/>
<text x="940.0" y="251" text-anchor="middle" class="value" fill="#116329">12.747x</text>
<text x="65" y="336" class="row">Core</text>
<text x="65" y="364" class="small">260 stable .NET cases</text>
<line x1="472.0" y1="345" x2="937.4" y2="345" stroke="#afb8c1" stroke-width="4" stroke-linecap="round"/>
<rect x="463" y="336" width="18" height="18" fill="#cf222e" stroke="#ffffff" stroke-width="2" transform="rotate(45 472 345)"/>
<text x="472.0" y="321" text-anchor="middle" class="value" fill="#a40e26">0.060x</text>
<circle cx="937.4" cy="345" r="12" fill="#1a7f37" stroke="#ffffff" stroke-width="3"/>
<text x="937.4" y="381" text-anchor="middle" class="value" fill="#116329">12.384x</text>
<text x="65" y="466" class="row">Fuzz</text>
<text x="65" y="494" class="small">268 stable .NET cases</text>
<line x1="445.5" y1="475" x2="766.9" y2="475" stroke="#afb8c1" stroke-width="4" stroke-linecap="round"/>
<rect x="436.5" y="466" width="18" height="18" fill="#cf222e" stroke="#ffffff" stroke-width="2" transform="rotate(45 445.5 475)"/>
<text x="445.5" y="451" text-anchor="middle" class="value" fill="#a40e26">0.045x</text>
<circle cx="766.9" cy="475" r="12" fill="#1a7f37" stroke="#ffffff" stroke-width="3"/>
<text x="766.9" y="511" text-anchor="middle" class="value" fill="#116329">1.760x</text>
<text x="60" y="586" class="note">C++ comparisons use 536 stable .NET cases; Python supplied 496 applicable shared cases. The 1x line marks parity.</text>
</svg>
