<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
<title id="title">RapidFuzzDotNet benchmark winners at a glance</title>
<desc id="desc">Using the equal-weight geometric mean of the batch, core, and fuzz category summaries, the fastest C++ result was 10.8 times faster than .NET 10, while RapidFuzzDotNet was 6.5 times faster than RapidFuzz Python. C++ and Python are separate baselines.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.eyebrow { font-size: 14px; font-weight: 700; }
.winner { font-size: 28px; font-weight: 700; }
.metric { font-size: 62px; font-weight: 800; }
.label { font-size: 21px; font-weight: 600; }
.note { font-size: 15px; fill: #57606a; }
.cpp { fill: #a40e26; }
.dotnet { fill: #116329; }
</style>
<rect width="1200" height="500" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="498" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="55" class="title">Who was faster, and by how much</text>
<text x="60" y="86" class="subtitle">Each comparison names the winner directly; there is no reciprocal speedup axis</text>
<rect x="60" y="125" width="510" height="270" rx="8" fill="#fff1f0" stroke="#ff8182" stroke-width="2"/>
<text x="92" y="163" class="eyebrow cpp">AGAINST FASTEST C++</text>
<text x="92" y="205" class="winner cpp">Native C++ leads</text>
<text x="92" y="280" class="metric cpp">10.8x</text>
<text x="92" y="318" class="label">faster than .NET</text>
<text x="92" y="362" class="note">Best result per case from GCC 14 or Clang 18</text>
<rect x="630" y="125" width="510" height="270" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="2"/>
<text x="662" y="163" class="eyebrow dotnet">AGAINST RAPIDFUZZ PYTHON</text>
<text x="662" y="205" class="winner dotnet">RapidFuzzDotNet leads</text>
<text x="662" y="280" class="metric dotnet">6.5x</text>
<text x="662" y="318" class="label">faster than Python</text>
<text x="662" y="362" class="note">RapidFuzz Python was built from its pinned source commit</text>
<text x="60" y="449" class="note">Category-balanced summary: equal-weight geometric mean of batch, core, and fuzz. C++ and Python are separate baselines.</text>
</svg>
