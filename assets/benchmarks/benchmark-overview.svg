<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
<title id="title">RapidFuzzDotNet benchmark at a glance</title>
<desc id="desc">On a logarithmic speedup scale, .NET 10 measured 0.092 times the speed of the fastest C++ result and 6.525 times the speed of RapidFuzz Python. Values above one mean .NET was faster.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.row { font-size: 19px; font-weight: 600; }
.value { font-size: 21px; font-weight: 700; }
.tick { font-size: 14px; fill: #57606a; }
.note { font-size: 15px; fill: #57606a; }
.callout { font-size: 18px; font-weight: 600; }
</style>
<rect width="1200" height="500" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="498" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="56" class="title">RapidFuzzDotNet benchmark at a glance</text>
<text x="60" y="87" class="subtitle">Geometric mean across category summaries · .NET 10 · logarithmic scale</text>
<line x1="300.0" y1="130" x2="300.0" y2="315" stroke="#d8dee4" stroke-width="1"/>
<text x="300.0" y="343" text-anchor="middle" class="tick">0.01x</text>
<line x1="505.0" y1="130" x2="505.0" y2="315" stroke="#d8dee4" stroke-width="1"/>
<text x="505.0" y="343" text-anchor="middle" class="tick">0.1x</text>
<line x1="710.0" y1="130" x2="710.0" y2="315" stroke="#24292f" stroke-width="2"/>
<text x="710.0" y="343" text-anchor="middle" class="tick">1x</text>
<line x1="915.0" y1="130" x2="915.0" y2="315" stroke="#d8dee4" stroke-width="1"/>
<text x="915.0" y="343" text-anchor="middle" class="tick">10x</text>
<line x1="1120.0" y1="130" x2="1120.0" y2="315" stroke="#d8dee4" stroke-width="1"/>
<text x="1120.0" y="343" text-anchor="middle" class="tick">100x</text>
<text x="60" y="183" class="row">vs fastest C++</text>
<line x1="497.6" y1="177" x2="710.0" y2="177" stroke="#cf222e" stroke-width="8" stroke-linecap="round"/>
<circle cx="497.6" cy="177" r="11" fill="#cf222e" stroke="#ffffff" stroke-width="3"/>
<text x="497.6" y="151" text-anchor="middle" class="value" fill="#a40e26">0.092x</text>
<text x="60" y="274" class="row">vs RapidFuzz Python</text>
<line x1="710.0" y1="268" x2="877.0" y2="268" stroke="#1a7f37" stroke-width="8" stroke-linecap="round"/>
<circle cx="877.0" cy="268" r="11" fill="#1a7f37" stroke="#ffffff" stroke-width="3"/>
<text x="877.0" y="242" text-anchor="middle" class="value" fill="#116329">6.525x</text>
<rect x="60" y="365" width="510" height="72" rx="6" fill="#ffebe9" stroke="#ff8182"/>
<text x="84" y="397" class="callout" fill="#a40e26">C++ was about 10.9x faster overall</text>
<text x="84" y="422" class="note">The comparison uses the faster result from GCC 14 or Clang 18.</text>
<rect x="630" y="365" width="510" height="72" rx="6" fill="#dafbe1" stroke="#4ac26b"/>
<text x="654" y="397" class="callout" fill="#116329">.NET was about 6.5x faster than Python</text>
<text x="654" y="422" class="note">Python supplied 496 applicable shared cases.</text>
<text x="60" y="474" class="note">Run 29145006354 · AMD EPYC 9V74 · Ubuntu 24.04 · July 11, 2026</text>
</svg>
