<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="930" viewBox="0 0 1200 930" role="img" aria-labelledby="title desc">
<title id="title">Speedup by algorithm on exact shared cases</title>
<desc id="desc">Geometric mean speedups compare .NET 10 with the fastest C++ result and RapidFuzz Python across 489 exact shared stable cases. .NET trails C++ for every algorithm aggregate. It leads Python for all aggregates except TokenSetRatio and PartialTokenSetRatio.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.row { font-size: 17px; font-weight: 700; }
.small { font-size: 14px; fill: #57606a; }
.value { font-size: 14px; font-weight: 700; }
.tick { font-size: 14px; fill: #57606a; }
.legend { font-size: 16px; font-weight: 600; }
.note { font-size: 15px; fill: #57606a; }
</style>
<rect width="1200" height="930" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="928" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="52" class="title">Where the performance gap comes from</text>
<text x="60" y="82" class="subtitle">Geometric mean speedup across 489 exact shared stable cases; values above 1x favor .NET</text>
