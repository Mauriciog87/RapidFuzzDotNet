<text x="557.5" y="854" text-anchor="middle" class="tick">0.1x</text>
<line x1="750" y1="142" x2="750" y2="830" stroke="#24292f" stroke-width="2"/>
<text x="750" y="854" text-anchor="middle" class="tick">1x</text>
<line x1="942.5" y1="142" x2="942.5" y2="830" stroke="#d8dee4" stroke-width="1"/>
