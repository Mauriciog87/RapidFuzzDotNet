<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="940" viewBox="0 0 1200 940" role="img" aria-labelledby="title desc">
<title id="title">Benchmark winners by algorithm</title>
<desc id="desc">Across 489 exact shared stable cases, C++ leads every algorithm aggregate. RapidFuzzDotNet leads Python in 11 of 13 algorithm aggregates. Python leads TokenSetRatio by 2.4 times and PartialTokenSetRatio by 2.9 times.</desc>
<style>
text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; letter-spacing: 0; }
.title { font-size: 30px; font-weight: 700; }
.subtitle { font-size: 17px; fill: #57606a; }
.header { font-size: 16px; font-weight: 700; fill: #57606a; }
.algorithm { font-size: 16px; font-weight: 700; }
.count { font-size: 14px; fill: #57606a; }
.winner { font-size: 16px; font-weight: 800; }
.note { font-size: 15px; fill: #57606a; }
.cpp { fill: #a40e26; }
.dotnet { fill: #116329; }
.python { fill: #7d4e00; }
</style>
<rect width="1200" height="940" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="938" rx="8" fill="none" stroke="#d0d7de" stroke-width="2"/>
<text x="60" y="54" class="title">Algorithm winners at a glance</text>
<text x="60" y="84" class="subtitle">Every cell names the winner and multiplier; 11 of 13 aggregates favor .NET over Python</text>
<text x="510" y="126" text-anchor="middle" class="header">AGAINST FASTEST C++</text>
<text x="935" y="126" text-anchor="middle" class="header">AGAINST RAPIDFUZZ PYTHON</text>
